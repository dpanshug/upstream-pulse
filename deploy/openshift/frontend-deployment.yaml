# =============================================================================
# Frontend Deployment
# nginx serving the React SPA, proxying /api to backend.
# An oauth-proxy sidecar handles OpenShift OAuth authentication.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: upstream-pulse
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: upstream-pulse
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: upstream-pulse
        app.kubernetes.io/component: ui
    spec:
      serviceAccountName: frontend-proxy
      containers:
        # --- React SPA served by nginx ---
        - name: frontend
          image: DEPLOY_REGISTRY/upstream-pulse/frontend:latest  # Overridden by deploy.sh set_runtime_images
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3

        # --- OpenShift OAuth Proxy sidecar ---
        # Authenticates users via OpenShift OAuth before forwarding to nginx.
        # Alternative images:
        #   registry.redhat.io/openshift4/ose-oauth-proxy-rhel9  (RHEL entitled clusters)
        - name: oauth-proxy
          image: quay.io/openshift/origin-oauth-proxy:4.16
          imagePullPolicy: IfNotPresent
          args:
            - --http-address=
            - --https-address=:4180
            - --provider=openshift
            - --openshift-service-account=frontend-proxy
            - --upstream=http://localhost:8080
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret-file=/etc/proxy/secrets/session_secret
            - --cookie-secure=true
            - --email-domain=*
            - --pass-access-token=false
            # Uncomment to restrict access to users with namespace-level permissions:
            # - --openshift-sar={"namespace":"upstream-pulse","resource":"services","verb":"get"}
          ports:
            - containerPort: 4180
              name: proxy
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            tcpSocket:
              port: 4180
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket:
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          volumeMounts:
            - name: proxy-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: proxy-cookie-secret
              mountPath: /etc/proxy/secrets
              readOnly: true
      volumes:
        # TLS cert/key auto-generated by OpenShift via the Service annotation
        - name: proxy-tls
          secret:
            secretName: frontend-proxy-tls
        - name: proxy-cookie-secret
          secret:
            secretName: frontend-proxy-cookie
