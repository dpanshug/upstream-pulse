# =============================================================================
# PostgreSQL 16 — PVC + Deployment + Service
# =============================================================================

# --- Persistent Volume Claim ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: upstream-pulse
  labels:
    app.kubernetes.io/part-of: upstream-pulse
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# --- Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: upstream-pulse
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: upstream-pulse
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate  # PostgreSQL can't share a PVC between pods
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: upstream-pulse
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: image-registry.openshift-image-registry.svc:5000/upstream-pulse/postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data

---
# --- Service ---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: upstream-pulse
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: upstream-pulse
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgres
