# =============================================================================
# OpenShift Route — exposes the frontend to the internet with TLS
#
# Traffic flow: internet → Route (TLS) → oauth-proxy (4180) → nginx (8080)
# TLS is re-encrypted: the Route terminates the external cert and opens a new
# TLS connection to the oauth-proxy using the serving cert generated by
# the Service annotation.
# =============================================================================
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: upstream-pulse
  namespace: upstream-pulse
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: upstream-pulse
    app.kubernetes.io/component: ui
  annotations:
    haproxy.router.openshift.io/timeout: 300s
spec:
  # Uncomment and set a custom hostname if desired:
  # host: upstream-pulse.apps.your-cluster.example.com
  to:
    kind: Service
    name: frontend
    weight: 100
  port:
    targetPort: proxy
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
