# =============================================================================
# Upstream Pulse — Required Secrets
#
# DO NOT create these from a file. Create them directly on the cluster:
#
#   oc create secret generic postgres-credentials \
#     --from-literal=POSTGRES_DB=upstream_pulse \
#     --from-literal=POSTGRES_USER=postgres \
#     --from-literal=POSTGRES_PASSWORD=<your-secure-password> \
#     -n upstream-pulse
#
#   oc create secret generic upstream-pulse-secrets \
#     --from-literal=GITHUB_TOKEN=<your-github-pat> \
#     --from-literal=GOOGLE_AI_API_KEY=<your-google-ai-key> \
#     --from-literal=JWT_SECRET=$(openssl rand -base64 32) \
#     --from-literal=GITHUB_TEAM_TOKEN=<your-github-team-pat> \
#     -n upstream-pulse
#
#   # OAuth Proxy session cookie encryption key (must be 16, 24, or 32 bytes)
#   oc create secret generic frontend-proxy-cookie \
#     --from-literal=session_secret=$(openssl rand -base64 32 | head -c 32) \
#     -n upstream-pulse
#
# This keeps secrets out of git and stores them encrypted in etcd (AWS KMS).
# =============================================================================

# --- Required keys for postgres-credentials ---
# POSTGRES_DB        Database name (e.g., upstream_pulse)
# POSTGRES_USER      Database user (e.g., postgres)
# POSTGRES_PASSWORD  Database password

# --- Required keys for upstream-pulse-secrets ---
# GITHUB_TOKEN       GitHub Personal Access Token (repo read access)
# GOOGLE_AI_API_KEY  Google Gemini API key
# JWT_SECRET         Random string for signing JWT tokens
# GITHUB_TEAM_TOKEN  GitHub PAT for team sync (read:org scope)

# --- Required keys for frontend-proxy-cookie ---
# session_secret     Random 32-byte string for encrypting OAuth session cookies
