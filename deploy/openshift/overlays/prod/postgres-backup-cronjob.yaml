# =============================================================================
# PostgreSQL Backup CronJob — pg_dump to AWS S3 (SSE-S3 encrypted)
#
# Prerequisites:
#   1. S3 bucket created with SSE-S3 default encryption enabled
#   2. IAM service account with s3:PutObject, s3:GetObject, s3:DeleteObject,
#      s3:ListBucket, s3:HeadObject scoped to the bucket
#   3. aws-s3-credentials secret created on cluster (see base/secrets.example.yaml)
#   4. pg-backup image built and pushed (see backup.Dockerfile)
#   5. This file uncommented in kustomization.yaml
#
# Schedule: Daily at 2:00 AM UTC
# Retention: 14 days (configurable via BACKUP_RETENTION_DAYS in secret)
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: upstream-pulse
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/part-of: upstream-pulse
    app.kubernetes.io/component: backup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup
            app.kubernetes.io/part-of: upstream-pulse
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-backup
              image: image-registry.openshift-image-registry.svc:5000/upstream-pulse/pg-backup:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="upstream-pulse-${TIMESTAMP}.sql.gz"
                  S3_PATH="s3://${S3_BUCKET}/backups/${BACKUP_FILE}"

                  echo "[$(date -u)] Starting backup..."
                  echo "[$(date -u)] Target: ${S3_PATH}"

                  pg_dump "${DATABASE_URL}" \
                    --no-owner \
                    --no-privileges \
                    --format=plain \
                    | gzip \
                    | aws s3 cp - "${S3_PATH}" --sse AES256

                  echo "[$(date -u)] Upload complete. Verifying..."

                  OBJECT_SIZE=$(aws s3api head-object \
                    --bucket "${S3_BUCKET}" \
                    --key "backups/${BACKUP_FILE}" \
                    --query 'ContentLength' \
                    --output text)

                  if [ "${OBJECT_SIZE}" -lt 100 ]; then
                    echo "[$(date -u)] ERROR: Backup file is suspiciously small (${OBJECT_SIZE} bytes)"
                    exit 1
                  fi

                  echo "[$(date -u)] Verified: ${BACKUP_FILE} (${OBJECT_SIZE} bytes)"

                  CUTOFF_DATE=$(date -d "@$(( $(date +%s) - ${BACKUP_RETENTION_DAYS} * 86400 ))" +%Y%m%d)
                  echo "[$(date -u)] Pruning backups older than ${CUTOFF_DATE}..."

                  aws s3 ls "s3://${S3_BUCKET}/backups/" \
                    | awk '{print $4}' \
                    | { grep '\.sql\.gz$' || true; } \
                    | while read -r file; do
                        FILE_DATE=$(echo "$file" | grep -oE '[0-9]{8}')
                        if [ -n "${FILE_DATE}" ] && [ "${FILE_DATE}" \< "${CUTOFF_DATE}" ]; then
                          echo "  Deleting: ${file}"
                          aws s3 rm "s3://${S3_BUCKET}/backups/${file}"
                        fi
                      done

                  echo "[$(date -u)] Backup complete."
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: POSTGRES_DB
                - name: DATABASE_URL
                  value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-s3-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-s3-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: aws-s3-credentials
                      key: AWS_DEFAULT_REGION
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: aws-s3-credentials
                      key: S3_BUCKET
                - name: BACKUP_RETENTION_DAYS
                  valueFrom:
                    secretKeyRef:
                      name: aws-s3-credentials
                      key: BACKUP_RETENTION_DAYS
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
