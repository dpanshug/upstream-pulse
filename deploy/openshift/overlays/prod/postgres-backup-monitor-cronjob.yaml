# =============================================================================
# PostgreSQL Backup Monitor — checks that today's backup exists in S3
#
# Runs daily at 6:00 AM UTC (4 hours after the 2 AM backup).
# Logs PASS/FAIL with file size. Check results via:
#   oc -n upstream-pulse logs -l app.kubernetes.io/name=postgres-backup-monitor --tail=20
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup-monitor
  namespace: upstream-pulse
  labels:
    app.kubernetes.io/name: postgres-backup-monitor
    app.kubernetes.io/part-of: upstream-pulse
    app.kubernetes.io/component: backup
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup-monitor
            app.kubernetes.io/part-of: upstream-pulse
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: monitor
              image: quay.io/org-pulse/pg-backup:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  TODAY=$(date +%Y%m%d)
                  echo "[$(date -u)] Checking for backup from ${TODAY}..."

                  LATEST_FILE=$(aws s3 ls "s3://${S3_BUCKET}/backups/" \
                    | awk '{print $4}' \
                    | { grep "^upstream-pulse-${TODAY}" || true; } \
                    | tail -1)

                  if [ -z "${LATEST_FILE}" ]; then
                    echo "FAIL: No backup found for ${TODAY}"
                    echo "  Expected file matching: upstream-pulse-${TODAY}-*.sql.gz"
                    echo "  Available backups:"
                    aws s3 ls "s3://${S3_BUCKET}/backups/" | tail -5
                    exit 1
                  fi

                  OBJECT_SIZE=$(aws s3api head-object \
                    --bucket "${S3_BUCKET}" \
                    --key "backups/${LATEST_FILE}" \
                    --query 'ContentLength' \
                    --output text)

                  if [ "${OBJECT_SIZE}" -lt 1024 ]; then
                    echo "FAIL: Backup ${LATEST_FILE} is too small (${OBJECT_SIZE} bytes)"
                    exit 1
                  fi

                  SIZE_KB=$(( OBJECT_SIZE / 1024 ))
                  echo "PASS: ${LATEST_FILE} (${SIZE_KB} KB)"
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-s3-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-s3-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: aws-s3-credentials
                      key: AWS_DEFAULT_REGION
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: aws-s3-credentials
                      key: S3_BUCKET
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
