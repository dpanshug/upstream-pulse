services:
  # ── Infrastructure (used by both local dev and full-stack docker) ──
  postgres:
    image: postgres:16-alpine
    container_name: upstream-pulse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: upstream_pulse
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: upstream-pulse-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application containers (only used with `docker-compose --profile app`) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upstream-pulse-backend
    profiles: ["app"]
    ports:
      - "4321:4321"
    environment:
      - NODE_ENV=development
      - PORT=4321
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/upstream_pulse
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upstream-pulse-worker
    profiles: ["app"]
    command: ["node", "dist/worker.js"]
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/upstream_pulse
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: upstream-pulse-frontend
    profiles: ["app"]
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
