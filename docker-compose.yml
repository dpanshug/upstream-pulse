version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: upstream-pulse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: upstream_pulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: upstream-pulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend API server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upstream-pulse-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/upstream_pulse
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # BullMQ worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upstream-pulse-worker
    command: ["node", "dist/worker.js"]
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/upstream_pulse
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: upstream-pulse-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
